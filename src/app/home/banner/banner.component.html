<!-- THis the banner section  -->

<section class="banner d-flex flex-column position-relative">
  <video
    width="100%"
    #bgVideoElement
    autoplay
    muted
    loop
    playsinline
    class="bg-video"
    preload="metadata"
  >
    <ng-container *ngFor="let source of videoSources">
      <source [src]="source.src" [type]="source.type" />
    </ng-container>
    Your browser does not support the video tag.
  </video>
  <div class="container-fluid d-flex mt-2">
    <div class="row">
      <div class="banner-content">
        <h2 class="banner-title">Solving Problems With</h2>
        <h2 class="banner-subtitle">Versatile Technology</h2>
        <h3 class="banner-subtitle">Solutions.</h3>
        <div class="banner-subtitle-wrapper">
          <div
            class="banner-subtitle-container"
            [style.transform]="transformStyle"
            [style.transition]="transition"
          >
            <h4 class="banner-semi-subtitle" *ngFor="let subtitle of tickerItems">
              {{ subtitle }}
            </h4>
          </div>
        </div>
      </div>
      <div class="banner-btn">
        <button class="btn btn-Case" routerLink="/services">
          View Our Services<img
            src="assets/images/btn-arrow.svg"
            alt="arrow"
            class="banner-arrow"
          />
        </button>
        <!-- <button class="btn btn-Case">Check Our Case Studies<img src="assets/images/btn-arrow.svg" alt="arrow"
            class="banner-arrow"></button> -->
      </div>
    </div>
  </div>
</section>
