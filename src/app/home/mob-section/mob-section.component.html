<section class="mob-sec section">
  <div class="container">
    <div class="row ">
      <div class="col-lg-9">
        <div class="row row-123">
          <div class="col-lg-6" [@fadeInRight]>
            <div class="mob-box" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300">
              <h2>Developing an <span>MVP?</span></h2>
              <p>Want to launch quickly and speed up your time to market?</p>
              <a [routerLink]="['/contact']" fragment="contact-form" class="chat-btn">
                Let's Connect
                <img src="assets/images/btn-arrow.svg" alt="arrow" class="img-fluid" />
              </a>
            </div>
          </div>

          <div class="col-lg-6" [@fadeInLeft]>
            <div class="mob-box" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300">
              <h2>Need tech <span>guidance?</span></h2>
              <p>We'll help you nail down the perfect technical specs for your product.</p>
              <a [routerLink]="['/contact']" fragment="contact-form" class="chat-btn">
                Let's Connect
                <img src="assets/images/btn-arrow.svg" alt="arrow" class="img-fluid" />
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
